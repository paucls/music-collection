<header>
  <h1>My Music Collection</h1>
  <div class="filter-section" *ngIf="!loading && !error">
    <label for="artist-filter">Filter by Artist:</label>
    <select id="artist-filter" [value]="selectedArtist" (change)="filterByArtist($any($event.target).value)">
      <option value="">All Artists</option>
      <option *ngFor="let artist of artists" [value]="artist">{{ artist }}</option>
    </select>
    <p>{{ filteredAlbums.length }} albums</p>
  </div>
</header>

<main>
  <div *ngIf="loading" class="loading">Loading albums...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error" class="album-grid">
    <app-album *ngFor="let album of filteredAlbums; trackBy: trackById" [album]="album"></app-album>
  </div>

  <div *ngIf="!loading && !error && filteredAlbums.length === 0" class="empty">
    <p>No albums found in your collection.</p>
  </div>
</main>
