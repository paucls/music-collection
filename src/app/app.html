<header>
  <h1>My Music Collection</h1>
  <div class="filter-section" *ngIf="!loading && !error">
    <div class="filter-row">
      <label>Type:</label>
      <div class="type-buttons">
        <button
          class="type-button"
          [class.active]="selectedTypes.size === 0"
          (click)="clearTypeFilter()"
        >
          All Types
        </button>
        <button
          *ngFor="let type of types"
          class="type-button"
          [class.active]="selectedTypes.has(type)"
          (click)="filterByType(type)"
        >
          <span class="type-icon">{{ getTypeIcon(type) }}</span>
          <span class="type-label">{{ formatType(type) }}</span>
        </button>
      </div>
      <label>Artist:</label>
      <div class="multiselect-dropdown" [class.open]="showDropdown">
        <div class="dropdown-trigger" (click)="toggleDropdown()">
          <span class="dropdown-text">
            {{ getSelectedCount() === 0 ? 'Select Artists' : getSelectedCount() + ' artist(s) selected' }}
          </span>
          <span class="dropdown-arrow">▼</span>
        </div>
        <div class="dropdown-content" *ngIf="showDropdown">
          <label class="checkbox-item">
            <input type="checkbox" [checked]="selectedArtists.size === 0" (change)="selectedArtists.clear(); applyFilter()" />
            <span>All Artists</span>
          </label>
          <label class="checkbox-item" *ngFor="let artist of artists">
            <input type="checkbox" [checked]="selectedArtists.has(artist)" (change)="filterByArtist(artist)" />
            <span>{{ artist }}</span>
          </label>
        </div>
      </div>
    </div>
    <div class="search-count-row">
      <div class="search-section">
        <label>Search:</label>
        <input
          type="text"
          class="search-input"
          placeholder="Search albums by title or artist..."
          [(ngModel)]="searchTerm"
          (input)="onSearchChange()"
        />
      </div>
      <p>{{ filteredAlbums.length }} discs ({{ getAlbumCount(filteredAlbums) }} albums)</p>
    </div>
  </div>
</header>

<main>
  <div *ngIf="loading" class="loading">Loading albums...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error" class="album-grid">
    <app-album *ngFor="let album of filteredAlbums; trackBy: trackById" [album]="album"></app-album>
  </div>

  <div *ngIf="!loading && !error && filteredAlbums.length === 0" class="empty">
    <p>No albums found in your collection.</p>
  </div>
</main>
